site_name: PopMIP
site_description: A model intercomparison project for future population maps
site_author: Laurence Hawker, University of Bristol
site_url: https://popmip.github.io/PopMIP/
repo_url: https://github.com/laurencehawker/PopMIP
repo_name: PopMIP

# Use relative URLs within pages
use_directory_urls: true

# Theme configuration
theme:
  name: shadcn
  icon: assets/popmip-ensemble-mark.png
  show_title: true
  palette:
    primary: blue
    accent: cyan
  show_stargazers: false

# Plugins
plugins:
  - search

# Custom CSS and JavaScript
extra_css:
  - assets/custom.css

extra_javascript:
  - assets/custom.js

# Navigation is auto-generated from folder structure

# Markdown extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

# Versioning
extra:
  version:
    provider: mike
    default: latest
